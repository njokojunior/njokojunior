<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>njokojunior</title>
    <link
      rel="shortcut icon"
      href="./assets/icons/fav-icon.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div class="socials">
      <a href="#" class="social-icon"
        ><img src="./assets/icons/social-linkedin.png" alt="linkedIn"
      /></a>
      <a href="#" class="social-icon"
        ><img src="./assets/icons/social-facebook.png" alt="facebook"
      /></a>
      <a href="#" class="social-icon"
        ><img src="./assets/icons/social-email.png" alt="mail"
      /></a>
      <a href="#" class="social-icon"
        ><img src="./assets/icons/social-customer-service.png" alt="call"
      /></a>
    </div>
    <header class="header" id="header">
      <a class="logo" href="#header">
        <img src="./assets/header-logo.png" alt="njokojunior logo" />
      </a>
      <nav class="menu">
        <div class=""><a href="#">about</a></div>
        <div class=""><a href="#">skills</a></div>
        <div class=""><a href="#">projects</a></div>
        <div class=""><a href="#">contact</a></div>
        <div class=""><a href="#" class="btn-filled">Download CV</a></div>
      </nav>
    </header>
    <main class="main-view">
      <section class="description-container">
        <div>
          <h2>👋 Hey, I'm</h2>
          <h1>NJOKO JUNIOR</h1>
        </div>

        <h2>A Senior Full Stack <span> Web Developer</span></h2>
        <p>
          I build interactive websites and web applications using the latest
          technologies
        </p>
        <div class="cta-container">
          <a href="#contact" class="btn-filled">Contact Me</a>
          <a href="#projects" class="btn-stroke">See My Projects</a>
        </div>
      </section>
      <section class="owner-container">
        <div class="character">
          <img src="./assets/njokojuniorp.png" alt="character" />

          <div class="eyes">
            <!-- LEFT EYE -->
            <div class="eye" id="eye-left">
              <div class="pupil"></div>
            </div>

            <!-- RIGHT EYE -->
            <div class="eye" id="eye-right">
              <div class="pupil"></div>
            </div>
          </div>
        </div>

        <div class="circular-shape">
          <div class="technology t1">
            <img src="./assets/icons/js.png" alt="js icon" />
            Javascript
          </div>
          <div class="technology t2">
            <img src="./assets/icons/atom.png" alt="reactjs icon" />
            Reactjs
          </div>
          <div class="technology t3">
            <img src="./assets/icons/node-js.png" alt="Nodejs icon" />
            Nodejs
          </div>
          <div class="technology t4">
            <img src="./assets/icons/database.png" alt="database icon" />
            SQL
          </div>
          <div class="technology t5">
            <img
              src="./assets/icons/mongo-svgrepo-com.svg"
              alt="mongodb icon"
            />
            NoSQL
          </div>

          <div class="technology t6">
            <img src="./assets/icons/devops.png" alt="devops icon" />
            DevOps
          </div>
          <div class="technology t7">
            <img src="./assets/icons/wordpress.png" alt="WP icon" />
            WP & CMS
          </div>
          <div class="technology t8">
            <img src="./assets/icons/illustrator.png" alt="illustrator icon" />
            Ai & Ps
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
